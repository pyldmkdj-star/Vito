<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vito – Smart AI Assistant</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #007bff;
        }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        .logo-container {
            margin-bottom: 20px;
            text-align: center;
            user-select: none; -webkit-user-drag: none;
        }
        .logo-container img { width: 80px; height: auto; pointer-events: none; }

        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }

        .form-card {
            background: var(--card-bg); padding: 30px; border-radius: 15px;
            width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; }
        input, select {
            padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #333; color: white; font-size: 16px; width: 100%; box-sizing: border-box;
        }

        button.submit-btn {
            width: 100%; padding: 14px; background: var(--accent-color);
            border: none; border-radius: 8px; color: white; font-size: 18px;
            font-weight: bold; cursor: pointer;
        }

        #main-app { display: none; width: 100%; height: 100vh; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }

        #status {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); padding: 15px 30px;
            border-radius: 30px; font-size: 22px; font-weight: bold;
            z-index: 10; text-align: center; max-width: 85%;
        }

        #click-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; border: none; cursor: pointer; z-index: 5;
        }

        /* כפתור צילום עגול מקצועי כמו של מצלמת פלאפון - ללא טקסט */
        #shutter-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 15; width: 76px; height: 76px; background: white;
            border: 6px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease; padding: 0;
        }
        #shutter-btn:active { transform: translateX(-50%) scale(0.9); }

        /* מסך חסימה הרמטי מלא */
        #blocked-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: #7a1515; z-index: 200; color: white;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold; text-align: center; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="blocked-screen">
        <span id="blocked-msg">Access Denied / החשבון חסום</span>
    </div>

    <div id="auth-screen">
        <div class="logo-container" oncontextmenu="return false;">
            <img src="https://i.ibb.co/r2331BM8/1782692956589.png" alt="Vito Logo">
        </div>
        <div class="form-card">
            <h2 id="form-title">Registration</h2>
            <form id="reg-form" onsubmit="handleRegister(event)">
                <div class="form-group"><label id="lbl-name" for="fullName">Full Name</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label id="lbl-email" for="email">Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label id="lbl-date" for="birthDate">Birth Date</label><input type="date" id="birthDate" required></div>
                <div class="form-group"><label id="lbl-gender" for="gender">Gender</label>
                    <select id="gender" required>
                        <option value="" id="opt-select">Select...</option>
                        <option value="Male" id="opt-male">Male</option>
                        <option value="Female" id="opt-female">Female</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" id="btn-submit">Start using Vito</button>
            </form>
        </div>
    </div>

    <div id="main-app">
        <div id="status">Loading...</div>
        <video id="video" autoplay playsinline muted></video>
        <button id="click-area" onclick="captureAndIdentify()"></button>
        
        <button id="shutter-btn" onclick="captureAndIdentify()"></button>
        
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const BACKEND_URL = "https://vito-ck9h.onrender.com"; 

        const translations = {
            he: { title: "הרשמה למערכת", name: "שם מלא", email: "אימייל", date: "תאריך לידה", gender: "מגדר", select: "בחר...", male: "זכר", female: "נקבה", submit: "התחל להשתמש ב-Vito", ready: "לחץ לצילום חפץ", scanning: "מנתח תמונה...", errorCam: "שגיאה בגישה למצלמה", blocked: "חשבונך חסום במערכת ולא ניתן להמשיך.", langCode: "he-IL", prompt: "תגיד לי מהו החפץ המרכזי או המוצר שנמצא בתמונה הזו. תענה אך ורק בשם החפץ בעברית, מקסימום 2-3 מילים, בלי סימני פיסוק ובלי הקדמות." },
            en: { title: "Registration", name: "Full Name", email: "Email", date: "Birth Date", gender: "Gender", select: "Select...", male: "Male", female: "Female", submit: "Start using Vito", ready: "Tap to scan object", scanning: "Analyzing...", errorCam: "Camera error", blocked: "Your account has been blocked.", langCode: "en-US", prompt: "What is the main object in this image? Reply only with the object name in English, max 2-3 words." }
        };

        const userLang = navigator.language.substring(0, 2);
        const currentLang = translations[userLang] ? userLang : 'en';
        const t = translations[currentLang];

        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'he' ? 'rtl' : 'ltr';
        document.getElementById('form-title').innerText = t.title;
        document.getElementById('lbl-name').innerText = t.name;
        document.getElementById('lbl-email').innerText = t.email;
        document.getElementById('lbl-date').innerText = t.date;
        document.getElementById('lbl-gender').innerText = t.gender;
        document.getElementById('opt-select').innerText = t.select;
        document.getElementById('opt-male').innerText = t.male;
        document.getElementById('opt-female').innerText = t.female;
        document.getElementById('btn-submit').innerText = t.submit;
        document.getElementById('status').innerText = t.ready;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        let isProcessing = false;

        window.addEventListener('load', async () => {
            const savedEmail = localStorage.getItem('vito_user_email');
            if (savedEmail) {
                if (await checkBlockStatus(savedEmail)) {
                    triggerBlock();
                    return;
                }
                showApp();
            }
        });

        async function checkBlockStatus(email) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/check-user?email=${encodeURIComponent(email)}`);
                const data = await res.json();
                return data.blocked;
            } catch (e) { return false; }
        }

        function triggerBlock() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'none';
            const bScreen = document.getElementById('blocked-screen');
            bScreen.style.display = 'flex';
            document.getElementById('blocked-msg').innerText = t.blocked;
        }

        async function handleRegister(e) {
            e.preventDefault();
            const userData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                birthDate: document.getElementById('birthDate').value,
                gender: document.getElementById('gender').value
            };
            
            if (await checkBlockStatus(userData.email)) {
                triggerBlock();
                return;
            }

            try {
                await fetch(`${BACKEND_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                localStorage.setItem('vito_user_email', userData.email);
                showApp();
            } catch (err) {
                localStorage.setItem('vito_user_email', userData.email);
                showApp();
            }
        }

        function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            setupCamera();
        }

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = stream;
            } catch (err) { statusDiv.innerText = t.errorCam; }
        }

        async function captureAndIdentify() {
            if (isProcessing) return;
            const email = localStorage.getItem('vito_user_email');
            if (await checkBlockStatus(email)) { triggerBlock(); return; }

            isProcessing = true;
            statusDiv.innerText = t.scanning;

            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            try {
                const response = await fetch(`${BACKEND_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image, prompt: t.prompt, email: email })
                });
                const data = await response.json();
                if (data.result) {
                    statusDiv.innerText = data.result;
                    speak(data.result);
                    
                    // תיקון: מחכה 3 שניות שלמות אחרי קבלת התוצאה והדיבור לפני החזרה לסריקה
                    setTimeout(() => {
                        isProcessing = false;
                        statusDiv.innerText = t.ready;
                    }, 3000);
                } else {
                    isProcessing = false;
                    statusDiv.innerText = t.ready;
                }
            } catch (error) {
                statusDiv.innerText = "Error";
                isProcessing = false;
                setTimeout(() => { statusDiv.innerText = t.ready; }, 1000);
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = t.langCode;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
